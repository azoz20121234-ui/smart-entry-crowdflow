services:
  - type: web
    name: smart-entry-crowdflow
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
